zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 95618eb1474e44ac91b00d5c9bc7e33a
      name: Favor-group
  templates:
    - uuid: 0ea120fe92364857b52696caed4eb02d
      template: 'Favor-group tg-agent monitoring'
      name: 'Favor-group tg-agent monitoring'
      description: 'Watches the unattended ads-cron claude -p runs of the tg-agent stack on terrty (favor-group.ru repo, tg-agent/). The host wrapper tg-agent/cron/ads-cron-run.sh pushes each run''s exit code via zabbix_sender. A failing run most often means the shared claude.ai login in the claude-auth volume expired — recovery is the interactive re-login documented in tg-agent/README.md.'
      groups:
        - name: Favor-group
      items:
        - uuid: b3c6daf7c31444da8dcdaa57cf6a90f1
          name: 'tg-agent ads-cron run exit code'
          type: TRAP
          key: tgagent.adscron.status
          delay: '0'
          history: 90d
          description: 'Exit code of the latest ads-cron daily/weekly run (0 = report posted or correctly skipped as duplicate). Pushed by tg-agent/cron/ads-cron-run.sh on terrty after every run: daily at 21:00 UTC Sunday-Friday, so the longest normal silence is the Saturday gap (Friday 21:00 -> Sunday 21:00, 48h).'
          tags:
            - tag: Application
              value: tg-agent
          triggers:
            - uuid: 62cabf479eab4551b0aa78288a3f77c5
              expression: 'last(/Favor-group tg-agent monitoring/tgagent.adscron.status)<>0'
              name: 'tg-agent ads-cron run failed — check claude.ai login on terrty'
              priority: HIGH
              description: 'The unattended ads report run exited non-zero. Most likely the shared claude.ai OAuth login in the favor-tg-agent_claude-auth volume expired (this also silently kills all three Telegram bots). Check tg-agent/data/ads-cron/cron.log on terrty; re-login per tg-agent/README.md (interactive claude session in any agent container). Clears on the next successful run.'
              manual_close: 'YES'
            - uuid: 5e762b2c957f4d2ca18d46722ce57c97
              expression: 'nodata(/Favor-group tg-agent monitoring/tgagent.adscron.status,54h)=1'
              name: 'tg-agent ads-cron has not reported for 54h'
              priority: AVERAGE
              description: 'No exit-code push for over 54h — the host crontab entry is gone, docker compose is broken, or the wrapper can''t reach zabbix. Normal max gap is 48h (no run covering Saturday). Check crontab -l and tg-agent/data/ads-cron/cron.log on terrty.'
              manual_close: 'YES'
