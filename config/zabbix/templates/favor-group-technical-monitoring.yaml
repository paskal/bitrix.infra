zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 95618eb1474e44ac91b00d5c9bc7e33a
      name: Favor-group
  templates:
    - uuid: dead28baa15c463b8a744f9e83580f16
      template: 'Favor-group technical monitoring'
      name: 'Favor-group technical monitoring'
      groups:
        - name: Favor-group
      items:
        - uuid: 35cb7b56dcee4965bb7221e28f154f55
          name: 'dnsrobocert Yandex Cloud auth key is set'
          type: ZABBIX_ACTIVE
          key: 'system.run["echo $AUTH_KEY | grep -qE ''^.+$'' || echo ''./scripts/update-dns-token.sh have not set the auth_key, open https://oauth.yandex.ru/authorize?response_type=token&client_id={$YC.OAUTH_CLIENT_ID} and run yc config set token <token>''"]'
          delay: 30m
          history: 3d
          value_type: TEXT
          description: 'Renewed by script `scripts/update-dns-token.sh`'
          tags:
            - tag: Application
              value: Web
          triggers:
            - uuid: 0843c11266d843cbbb11c5a08aca70e9
              expression: 'length(last(/Favor-group technical monitoring/system.run["echo $AUTH_KEY | grep -qE ''^.+$'' || echo ''./scripts/update-dns-token.sh have not set the auth_key, open https://oauth.yandex.ru/authorize?response_type=token&client_id={$YC.OAUTH_CLIENT_ID} and run yc config set token <token>''"],#1))<>0'
              name: 'dnsrobocert Yandex Cloud auth key is set'
              priority: WARNING
              description: |
                Follow the instructions to renew the token; otherwise, the dnsrobocert container won't be able to renew the HTTPS certificate for favor-group.ru and its subdomains.
                https://yandex.cloud/en/docs/iam/concepts/authorization/oauth-token
        - uuid: fff6d83790094838998f78ed02853d73
          name: 'Module redirect to relative path'
          type: ZABBIX_ACTIVE
          key: 'system.run["mariadb --defaults-extra-file=/etc/mysql/zbx.cnf -e \"select old_url, new_url from favor_group_ru.b_esolredirector_redirects where new_url regexp ''^[^/]'';\""]'
          delay: 3h
          history: 3d
          value_type: TEXT
          description: |
            That causes endless redirect loops. new_url should be absolute (start with slash).
            
            b24 task 6712
          tags:
            - tag: Application
              value: Web
          triggers:
            - uuid: c7d4e06b364a4b4f871edfe7d540ab6c
              expression: 'length(last(/Favor-group technical monitoring/system.run["mariadb --defaults-extra-file=/etc/mysql/zbx.cnf -e \"select old_url, new_url from favor_group_ru.b_esolredirector_redirects where new_url regexp ''^[^/]'';\""],#1))<>0'
              name: 'Redirects module has relative destinations, all links should start with slash'
              url: '{$BITRIX.ADMIN_URL}/esol_redirector_redirect_list.php?lang=ru'
              priority: WARNING
              description: |
                new_url should be fixed to start with slash, as otherwise we have redirect loop.
                
                b24 task 6712
              manual_close: 'YES'
        - uuid: 045794e372144e6992725142f5e8efa0
          name: 'Silent 5xx responses on user-facing pages'
          type: ZABBIX_ACTIVE
          key: 'system.run["MIN_RE=$(for i in 0 1 2 3 4 5; do date -u -d \"$i minutes ago\" +\"%d/%b/%Y:%H:%M\"; done | paste -sd\"|\" -); grep -E \"\[($MIN_RE)\" /var/log/nginx/prod.access.log | awk ''$9~/^5[0-9][0-9]$/ && $7!~/^\/ajax\// && $7!~/^\/bitrix\// && $7!~/[<>\"\047]/ {print $4, $6, $7, $9}'' | head -10"]'
          delay: 5m
          history: 7d
          value_type: TEXT
          description: |
            Scans the last ~6 minutes of /var/log/nginx/prod.access.log for 5xx responses on user-facing pages (main page, catalog, info, montag, projects).

            Catches "silent 500" incidents where the page may render partially but nginx returns 500/502/503/504 due to a PHP fatal late in the request - the existing HTTP scenarios only detect this after 3 consecutive failures (~15 min) and miss short bursts.

            Excludes /ajax/, /bitrix/ paths and bot probe URLs containing quote/angle characters.
          tags:
            - tag: Application
              value: Web
          triggers:
            - uuid: e1ec32f05bd94a7286c87648d6a24265
              expression: 'find(/Favor-group technical monitoring/system.run["MIN_RE=$(for i in 0 1 2 3 4 5; do date -u -d \"$i minutes ago\" +\"%d/%b/%Y:%H:%M\"; done | paste -sd\"|\" -); grep -E \"\[($MIN_RE)\" /var/log/nginx/prod.access.log | awk ''$9~/^5[0-9][0-9]$/ && $7!~/^\/ajax\// && $7!~/^\/bitrix\// && $7!~/[<>\"\047]/ {print $4, $6, $7, $9}'' | head -10"],30m,"regexp",".")=1'
              name: 'Silent 5xx responses on user-facing pages: {ITEM.VALUE}'
              priority: HIGH
              description: |
                User-facing page requests returned 5xx in the last ~5 minutes. Check the PHP error log (`tail /web/logs/php/error.log`) and recent deployments.
              manual_close: 'YES'
        - uuid: 7aad0960ff9c4f55a7552c059441b1de
          name: 'Silent 5xx responses on AJAX endpoints'
          type: ZABBIX_ACTIVE
          key: 'system.run["MIN_RE=$(for i in 0 1 2 3 4 5; do date -u -d \"$i minutes ago\" +\"%d/%b/%Y:%H:%M\"; done | paste -sd\"|\" -); grep -E \"\[($MIN_RE)\" /var/log/nginx/prod.access.log | awk ''$9~/^5[0-9][0-9]$/ && $7~/^\/ajax\// && $7!~/[<>\"\047]/ {print $4, $6, $7, $9}'' | head -10"]'
          delay: 5m
          history: 7d
          value_type: TEXT
          description: |
            Scans the last ~6 minutes of /var/log/nginx/prod.access.log for 5xx responses on /ajax/* endpoints (show_basket_fly, show_basket_popup, reload_basket_fly, download_basket, etc.).

            These AJAX fragments are called from already-rendered pages, so when they fail the main HTML looks fine but widgets break (basket counter stops updating, basket popup empty, etc.).

            Tracked separately from page 5xx because the user-visible symptom and the triage path are different.
          tags:
            - tag: Application
              value: Web
          triggers:
            - uuid: 3ec9f85c474e4e83810355553f641e52
              expression: 'find(/Favor-group technical monitoring/system.run["MIN_RE=$(for i in 0 1 2 3 4 5; do date -u -d \"$i minutes ago\" +\"%d/%b/%Y:%H:%M\"; done | paste -sd\"|\" -); grep -E \"\[($MIN_RE)\" /var/log/nginx/prod.access.log | awk ''$9~/^5[0-9][0-9]$/ && $7~/^\/ajax\// && $7!~/[<>\"\047]/ {print $4, $6, $7, $9}'' | head -10"],30m,"regexp",".")=1'
              name: 'Silent 5xx responses on AJAX endpoints: {ITEM.VALUE}'
              priority: AVERAGE
              description: |
                /ajax/* endpoints returned 5xx in the last ~5 minutes. Broken widgets on rendered pages (basket, fly cart, etc.). Check the PHP error log and recent deployments.
              manual_close: 'YES'
