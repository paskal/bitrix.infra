# Rate-limit the anonymous pageview-context beacon (served at /local/ajax/t.js,
# plus the legacy /local/ajax/cid-context.php alias for cached clients).
# The endpoint is unauthenticated, boots the full Bitrix kernel and upserts a
# row keyed on an attacker-chosen CID into fg_cid_context on every POST, so an
# unthrottled flood is both a PHP-FPM exhaustion and a store-poisoning vector.
# 5 req/s per IP with a small burst sits far above any real browser's
# sendBeacon cadence (one beacon per pageview). The limit_req directive that
# uses this zone lives on the exact-match location in bitrix.conf; rejected
# requests get 429 (limit_req_status set there), not 503.
limit_req_zone $binary_remote_addr zone=cid_context:10m rate=5r/s;
