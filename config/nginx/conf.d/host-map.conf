# HTTP_HOST for FastCGI: preserve non-standard port from the Host header when
# present (local demos on :8080 etc.); fall back to $host for HTTP/3 (QUIC)
# requests where the Host header is empty and only :authority is set.
map $http_host $bitrix_host {
    default          $host;
    # standard ports: strip, matching pre-2.0 behaviour for clients that
    # send the port in the Host header
    "~:(?:80|443)$"  $host;
    "~:"             $http_host;
}
