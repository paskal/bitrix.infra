# Yandex Metrika cookie lifetime extension (Safari compatibility)
# https://yandex.ru/support/metrica/general/safari-cookie.html
#
# Safari's ITP limits JS-set cookies to 7 days, so the Metrika visitor id
# (_ym_uid) expires between visits and returning visitors look new. Re-setting
# the cookies server-side keeps them for a year. The Set-Cookie headers are
# emitted from the `location ~ \.php$` block in bitrix.conf (documents only,
# never static assets - Safari refuses to disk-cache responses that carry
# Set-Cookie).
#
# OFF by default: the feature activates only when an overlay maps the host to
# a cookie domain, e.g. a private.conf.d/metrika-domain.map containing
#   "~(^|\.)example\.com$" ".example.com";
map $host $metrika_cookie_domain {
    default "";
    include /etc/nginx/private.conf.d/metrika-domain*.map;
}

# Uses map instead of `if` inside location blocks to avoid the nginx
# "if is evil" problem: `add_header` inside `if` replaces all parent-level
# `add_header` directives. When a variable resolves to "", nginx does not
# emit the header - the combined key below makes that happen unless BOTH the
# domain is configured and the _ym_uid cookie is present.

map "$metrika_cookie_domain:$cookie__ym_uid" $ym_set_cookie_uid {
    default "";
    "~^.+:.+$" "_ym_uid=$cookie__ym_uid;Max-Age=31536000;Secure;Path=/;Domain=$metrika_cookie_domain";
}

map "$metrika_cookie_domain:$cookie__ym_uid" $ym_set_cookie_d {
    default "";
    "~^.+:.+$" "_ym_d=$cookie__ym_d;Max-Age=31536000;Secure;Path=/;Domain=$metrika_cookie_domain";
}

map "$metrika_cookie_domain:$cookie__ym_uid" $ym_set_cookie_ucs {
    default "";
    "~^.+:.+$" "_ym_ucs=nginx;Max-Age=31536000;Secure;Path=/;Domain=$metrika_cookie_domain";
}
