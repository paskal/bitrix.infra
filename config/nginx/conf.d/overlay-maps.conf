# Overlay hook maps: site-specific behaviour re-attaches here without forking
# the shared config files (bitrix.conf, security_headers.conf, static-cdn.conf).
# Each map's entries are glob-included from /etc/nginx/private.conf.d/*.map
# (the private overlay); a glob matching nothing keeps the generic defaults
# below, so a fresh clone needs none of these files to exist.

# X-Frame-Options value; an empty value suppresses the header entirely
# (e.g. to let Yandex Metrika webvisor replay sessions in its iframe).
# A map instead of if/set avoids the "if is evil" add_header inheritance trap.
# NOTE: deploy frame-options*.map together with bitrix_csp_headers*.conf —
# suppressing XFO without a CSP frame-ancestors leaves no clickjacking guard.
map $http_referer $frame_options {
    default 'SAMEORIGIN';
    include /etc/nginx/private.conf.d/frame-options*.map;
}

# Hotlink protection for static files: value 1 returns 403. The default
# allows everything; an overlay typically whitelists empty/own-domain
# referers and blocks the remaining http(s) ones.
map $http_referer $hotlink_block {
    default 0;
    include /etc/nginx/private.conf.d/hotlink*.map;
}

# Content-Security-Policy for selected /bitrix/admin/ pages. Override per
# host to let an external CRM (e.g. a Bitrix24 tenant) embed them in frames.
map $host $admin_frame_csp {
    default "frame-ancestors 'self';";
    include /etc/nginx/private.conf.d/admin-csp*.map;
}

# Access-Control-Allow-Origin for the same admin pages; with the default
# empty value nginx does not emit the header at all.
map $host $admin_cors_origin {
    default '';
    include /etc/nginx/private.conf.d/admin-cors*.map;
}
