# Localhost demo server — serves the Bitrix installer/demo on a fresh clone.
# Real production site vhosts live in the private overlay (private.conf.d/sites/).
#
# Deliberately does NOT claim default_server: production overlays ship their own
# catch-all server blocks on :80 and :443, and a second default_server would
# cause an nginx -t hard failure at overlay cutover.  On a fresh public clone
# this is the only server block on :80 so it is the implicit default anyway.
server {
    listen 80;
    server_name localhost 127.0.0.1;

    root /web/prod;
    access_log /var/log/nginx/localhost.access.log main;
    error_log  /var/log/nginx/localhost.error.log;

    include bitrix.conf;
}
