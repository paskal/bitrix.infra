# Composite-site decision variable for bitrix.conf's `location /`.
#
# Bitrix "Композит" stores a static HTML snapshot of cacheable pages under
# /bitrix/html_pages/<host>/<path>/index@<args>.html. When enabled, nginx can
# serve those snapshots directly — no PHP, ~0.03s — for requests that are safe
# to cache: anonymous, GET, no query string. Everything else (logged-in users,
# query params, POST) must fall through to PHP, which runs Bitrix composite
# (parameter filtering, sessions, dynamic-area assembly).
#
# The decision is computed with `map` rather than `if`: an `if` inside a
# `location` silently bypasses that location's `try_files` ("if is evil"),
# which 404s every matching request.
#
# DEFAULT IS A NO-OP: $bx_composite_file falls back to $uri (a directory path,
# never a real file), so try_files skips it and the request reaches @bitrix ->
# PHP. This file is therefore safe to ship enabled-by-default: nothing changes
# until you turn Bitrix composite on (which creates the snapshots). $host comes
# from the HTTP/1.1 Host / HTTP/2 + HTTP/3 :authority uniformly, so snapshot
# keying is protocol-agnostic.
#
# Note: nginx serves the snapshot directly, so it does NOT inherit the per-page
# Bitrix composite cookie logic. The BITRIX_SM_LOGIN check below keeps
# remembered-login users on the PHP path; Bitrix's own auth handling covers the
# rest from @bitrix.

map $request_method $bx_cmp_get    { default 0; GET 1; }
map $args           $bx_cmp_noargs { default 0; ""  1; }
map $http_cookie    $bx_cmp_anon   { default 1; "~*BITRIX_SM_LOGIN" 0; }

map "$bx_cmp_get$bx_cmp_noargs$bx_cmp_anon" $bx_composite_file {
    default $uri;
    "111"   "/bitrix/html_pages/$host${uri}index@.html";
}
