ssl_certificate      /etc/nginx/letsencrypt/live/favor-group.ru/fullchain.pem;
ssl_certificate_key  /etc/nginx/letsencrypt/live/favor-group.ru/privkey.pem;
ssl_trusted_certificate /etc/nginx/letsencrypt/live/favor-group.ru/chain.pem;

include security_headers.conf;
# CSP headers, too dangerous to include to the code someone will copy and run
include /etc/nginx/private.conf.d/bitrix_csp_headers.conf;

charset utf-8;
index index.php;

# remove multiple slashes
# duplicated slashes will work and won't be rewritten, fixing it in this configuration is tricky
rewrite ^([^.]*?\/)\/+(.*)$ $1$2 permanent;

location / {
    try_files $uri $uri/ /bitrix/urlrewrite.php$is_args$args;
}

location = /restore.php {
    fastcgi_pass php-upstream;
    include fastcgi.conf;

    client_body_buffer_size 8192m;
    client_max_body_size 8192m;
}

location = /favicon.png {
    log_not_found off;
    access_log off;
}

location ^~ /robots.txt {
    log_not_found off;
    access_log off;
    # aspro.max multi-region robots.txt rewrite
    rewrite "robots.txt" /aspro_regions/robots/robots_$host.txt break;
}

location = /404.html {
    internal;
    access_log off;
    return 404;
}

# Any path component starting with a dot is denied by default (.git/, .claude/,
# .beads/, .env, .DS_Store, vim swap, .settings.php, …) — never web-served.
# Exemptions via negative lookahead; each MUST keep its trailing slash so only
# the exact directory is exempt (prevents e.g. a stray .defaultXYZ leaking):
#   - well-known/ — security.txt / change-password if ever added (cert renewal
#     is DNS-01 via Yandex Cloud, so HTTP-01 ACME isn't a dependency);
#   - default/ — Bitrix names its live component/theme TEMPLATE directories with
#     a literal leading dot and serves their CSS/JS/images from there
#     (/bitrix/themes/.default/, /bitrix/components/**/templates/.default/,
#     /local/templates/.default/). Blocking it 403s the admin styles and
#     component front-end assets.
# Only .default is live. The other dot-template-dirs in the webroot — .default_old
# (2019/2021 stock-component update backups) and the .preview / .big / .userfield
# variants (forum / photogallery / voting components, zero invocations on this
# site) — have no code references and are never requested, so they stay denied.
# Everything else dot-prefixed stays denied too (.github/, .psalm/, .phan/,
# .build-plugins/, .idea/, .settings/): no browser assets, and most sit inside
# already-denied module trees anyway.
location ~ /\.(?!well-known/|default/) {
    deny all;
}

location ~ (\.md$|\.(log|sh|bash)$|/composer|/bitrix/backup|/bitrix/updates|/bitrix/modules|/bitrix/php_interface|/bitrix/stack_cache|/bitrix/managed_cache|/bitrix/site_checker_|/upload/1c_exchange|/upload/sprod_integr_log|/upload/fs_\w+_debug\.log|/upload/webdebug\.antirutin/|/upload/acrit\.core/log/|/upload/kda\.importexcel/|local/modules|local/php_interface|local/cron|local/scripts|/logs/|^/docs/|^/tg-agent/|/ajax/js_error\.txt|acrit\.exportproplus|/upload/acrit\.export/(log|autobackup|\.tmp)/) {
    deny all;
}

# Fast 404 for common scanner probes (db dumps, backup files, env files,
# archive formats not covered by the static-file handler on line 59).
# Without this, these fall through to /bitrix/urlrewrite.php and tie up
# PHP-FPM workers for the full 60s fastcgi_read_timeout.
location ~* \.(sql|bak|backup|orig|swp|swo|env|dump|dmp|xz|z|war|lz|lzma|lz4|zst)$ {
    access_log off;
    log_not_found off;
    return 404;
}

# Internal location
location ^~ /upload/support/not_image { internal; }

# aspro.max multi-region sitemap rewrite
location ~ ^/sitemap.*\.xml$ {
    rewrite "/(sitemap.*)\.xml" /aspro_regions/sitemap/$1_$host.xml break;
}

# calculator source maps reveal the original engine sources — internal only
location ~* ^/local/components/calc/.+\.map$ { deny all; }

# all static locations except for txt and xml, with invalid referer check
location ~* ^.+\.(jpeg|jpg|png|gif|bmp|ico|svg|tif|tiff|css|map|js|json|htm|ttf|otf|webp|woff2?|csv|rtf|doc|docx|xls|xlsx|ppt|pptx|odf|odp|ods|odt|pdf|psd|ai|eot|eps|ps|zip|tar|tgz|gz|rar|bz2?|7z|aac|m4a|mp3|mp4|ogg|wav|wma|3gp|avi|flv|m4v|mkv|mov|mpe?g|wmv|exe|iso|dmg|swf|webmanifest)$ {
    error_page 404 /404.html;
    log_not_found off;
    access_log off;
    # single merged Cache-Control: `expires max` + `add_header Cache-Control public`
    # produced TWO Cache-Control headers (WebKit mishandles duplicates);
    # `immutable` stops Safari/Firefox from refetching subresources on reload
    add_header Cache-Control "public, max-age=315360000, immutable";
    include security_headers.conf;
    # CSP headers, too dangerous to include to the code someone will copy and run
    include /etc/nginx/private.conf.d/static_csp_headers.conf;
    # NOTE: no Set-Cookie here — Safari refuses to disk-cache any response
    # carrying Set-Cookie, so the Metrika cookie extension on static assets
    # made Safari refetch every image/css/js on each reload. The extension
    # now lives on the PHP (document) location, which fires on every page view.
    valid_referers none blocked favor-group.ru *.favor-group.ru *.cdn-favor-group.ru;
    if ($invalid_referer) {
        return 403;
    }
}

# xml and txt static location, without referer check
location ~* ^.+\.(xml|txt)$ {
    error_page 404 /404.html;
    log_not_found off;
    access_log off;
    # no `immutable` here: sitemaps and robots.txt do change
    add_header Cache-Control "public, max-age=315360000";
    include security_headers.conf;
    # CSP headers, too dangerous to include to the code someone will copy and run
    include /etc/nginx/private.conf.d/static_csp_headers.conf;
}

# Disable access for non-static assets in cache location
location ~* ^/bitrix/cache { deny all; }

location ~ /upload/ {
    client_body_buffer_size 1024m;
    client_max_body_size 1024m;
}

location ~ /bitrix/admin/fileman_medialib.php {
    fastcgi_pass php-upstream;
    include fastcgi.conf;
    client_body_buffer_size 1024m;
    client_max_body_size 1024m;
}

location ~* ^/bitrix/admin/(sale_order|sale_delivery|sale_app_rest_sender|sprod_integr_).*\.php$ {
    fastcgi_pass php-upstream;
    include fastcgi.conf;
    add_header Content-Security-Policy "frame-ancestors 'self' https://fs-group.bitrix24.ru;";
    add_header Access-Control-Allow-Origin "https://fs-group.bitrix24.ru;";
    # Modify Set-Cookie headers to add SameSite=None
    header_filter_by_lua_block {
        local cookies = ngx.header["Set-Cookie"]
        if cookies then
            -- Handle both single cookie (string) and multiple cookies (table)
            if type(cookies) == "string" then
                cookies = {cookies}
            end

            local modified_cookies = {}
            for i, cookie in ipairs(cookies) do
                -- Check if SameSite is already set
                if not string.find(cookie, "SameSite=") then
                    -- Add SameSite=None to the cookie
                    cookie = cookie .. "; SameSite=None"
                end
                modified_cookies[i] = cookie
            end

            -- Set the modified cookies back
            ngx.header["Set-Cookie"] = modified_cookies
        end
    }
}

location ~ \.php$ {
    try_files $uri $uri/ /bitrix/urlrewrite.php$is_args$args;
    # redirect index.php to page without it
    if ($request_uri ~* "^(.*/)index\.php$") {
        return 301 $1;
    }

    # extend Yandex Metrika cookie from 1 week to 1 year (maps in
    # metrika-cookies.conf); lives on the document response, NOT on static —
    # Set-Cookie on static assets breaks Safari disk caching.
    # add_header at location level cancels server-level header inheritance,
    # so security + CSP headers must be re-included here
    add_header Set-Cookie $ym_set_cookie_uid;
    add_header Set-Cookie $ym_set_cookie_d;
    add_header Set-Cookie $ym_set_cookie_ucs;
    include security_headers.conf;
    include /etc/nginx/private.conf.d/bitrix_csp_headers.conf;

    fastcgi_pass php-upstream;
    include fastcgi.conf;
    include bots.conf;
}
