# bitrix recommendation, respect server's mime-type and don't try to guess it
add_header X-Content-Type-Options nosniff;

# bitrix recommendation for stricter security,
# doesn't allow to show site in iframe.
# FLAGGED: the original regex exempted favor-group.ru and Yandex Metrika/Webvisor
# referers from X-Frame-Options to allow Metrika's webvisor iframe overlay.
# Extend the pattern in your overlay (override this file or add a conf.d snippet)
# if you need to whitelist specific referers; by default SAMEORIGIN is always set.
set $frame_options 'SAMEORIGIN';
# Example for Yandex Metrika webvisor: uncomment and adapt in overlay:
# if ($http_referer !~ '^https?:\/\/([^\/]+\.)?(example\.com|webvisor\.com|metri[ck]a\.yandex\.(com|ru|by|com\.tr))\/'){
#   set $frame_options 'SAMEORIGIN';
# }
add_header X-Frame-Options $frame_options;

# HTTPS only
add_header Strict-Transport-Security 'max-age=31536000; includeSubdomains; preload' always;

# for the sake of better benchmark score
add_header Referrer-Policy same-origin;

