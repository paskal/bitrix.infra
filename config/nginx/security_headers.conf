# bitrix recommendation, respect server's mime-type and don't try to guess it
add_header X-Content-Type-Options nosniff;

# bitrix recommendation for stricter security,
# doesn't allow to show site in iframe.
# value comes from the $frame_options map in conf.d/overlay-maps.conf;
# overlays can suppress the header for chosen referers (e.g. Yandex Metrika
# webvisor) by shipping a private.conf.d/frame-options*.map with empty values.
add_header X-Frame-Options $frame_options;

# HTTPS only
add_header Strict-Transport-Security 'max-age=31536000; includeSubdomains; preload' always;

# for the sake of better benchmark score
add_header Referrer-Policy same-origin;

