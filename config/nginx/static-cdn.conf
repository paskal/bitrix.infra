charset utf-8;

location = /robots.txt {
    log_not_found off;
    access_log off;
    rewrite "robots.txt" /robots-static.txt break;
}

# no sitemap should be present on the CDN
location ~ ^/sitemap.*\.xml$ { return 404; }

location ^~ /upload/sproduction.integration/ { return 404; }

location ~ (/upload/sprod_integr_log|/upload/fs_\w+_debug\.log) { deny all; }

location ~* ^.+\.(xml|txt|jpeg|jpg|png|gif|bmp|ico|svg|tif|tiff|css|map|js|json|htm|ttf|otf|webp|woff2?|csv|rtf|doc|docx|xls|xlsx|ppt|pptx|odf|odp|ods|odt|pdf|psd|ai|eot|eps|ps|zip|tar|tgz|gz|rar|bz2?|7z|aac|m4a|mp3|mp4|ogg|wav|wma|3gp|avi|flv|m4v|mkv|mov|mpe?g|wmv|exe|iso|dmg|swf|webmanifest)$ {
    log_not_found off;
    access_log /var/log/nginx/static-download.access.log main if=$audit_static_download;
    # single merged Cache-Control (duplicate headers confuse WebKit);
    # `immutable` stops Safari/Firefox refetching subresources on reload
    add_header Cache-Control "public, max-age=315360000, immutable";
    add_header Access-Control-Allow-Origin $allow_origin;
    include security_headers.conf;
    # CSP headers, too dangerous to include to the code someone will copy and run
    # Glob: matching nothing is fine; overlay drops its snippet here
    include /etc/nginx/private.conf.d/static_csp_headers*.conf;

    # hotlink protection via the $hotlink_block map (conf.d/overlay-maps.conf)
    if ($hotlink_block) {
        return 403;
    }
}

location / { return 404; }
